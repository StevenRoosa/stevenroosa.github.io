<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Kneedle knee point for cosine similarity scores</title>
  <desc id="desc">A chart showing cosine similarity scores increasing from left to right, with a marked knee point where marginal relevance begins to diminish.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
    <style>
      .bg { fill: #f8f7f3; }
      .panel { fill: #fffefa; stroke: #d7d3c8; stroke-width: 2; }
      .axis { stroke: #20211d; stroke-width: 2; }
      .grid { stroke: #d7d3c8; stroke-width: 1; }
      .curve { fill: none; stroke: #2f5d62; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .point { fill: #edf3ff; stroke: #7f9fcc; stroke-width: 3; }
      .knee { fill: #f4d5b6; stroke: #9b4f2f; stroke-width: 5; }
      .knee-line { stroke: #9b4f2f; stroke-width: 3; stroke-dasharray: 8 8; }
      .arrow { fill: none; stroke: #2f5d62; stroke-width: 3; marker-end: url(#arrow); }
      .tail { fill: #f4d5b6; opacity: 0.35; }
      .title { fill: #20211d; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 30px; font-weight: 750; }
      .label { fill: #20211d; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 650; }
      .small { fill: #62665c; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; }
    </style>
  </defs>

  <rect class="bg" width="920" height="520"/>
  <rect class="panel" x="42" y="38" width="836" height="444" rx="8"/>
  <text class="title" x="84" y="90">Use the knee to stop adding low-marginal-value context</text>
  <text class="small" x="84" y="122">Scores are sorted from lower cosine similarity to higher cosine similarity, left to right.</text>

  <line class="axis" x1="112" y1="408" x2="808" y2="408"/>
  <line class="axis" x1="112" y1="408" x2="112" y2="164"/>
  <line class="grid" x1="112" y1="344" x2="808" y2="344"/>
  <line class="grid" x1="112" y1="280" x2="808" y2="280"/>
  <line class="grid" x1="112" y1="216" x2="808" y2="216"/>

  <path class="tail" d="M 484 408 L 484 264 C 548 232, 632 216, 760 206 L 760 408 Z"/>
  <path class="curve" d="M 150 382 L 204 372 L 258 354 L 312 326 L 366 292 L 420 262 L 484 238 L 548 224 L 612 216 L 676 211 L 740 207"/>

  <circle class="point" cx="150" cy="382" r="7"/>
  <circle class="point" cx="204" cy="372" r="7"/>
  <circle class="point" cx="258" cy="354" r="7"/>
  <circle class="point" cx="312" cy="326" r="7"/>
  <circle class="point" cx="366" cy="292" r="7"/>
  <circle class="point" cx="420" cy="262" r="7"/>
  <circle class="knee" cx="484" cy="238" r="10"/>
  <circle class="point" cx="548" cy="224" r="7"/>
  <circle class="point" cx="612" cy="216" r="7"/>
  <circle class="point" cx="676" cy="211" r="7"/>
  <circle class="point" cx="740" cy="207" r="7"/>

  <line class="knee-line" x1="484" y1="238" x2="484" y2="408"/>
  <path class="arrow" d="M 626 162 C 580 154, 526 176, 492 228"/>
  <text class="label" x="636" y="158">knee point</text>
  <text class="label" x="330" y="456">Candidate rank sorted by score</text>
  <text class="label" transform="translate(76 360) rotate(-90)">Cosine similarity</text>
  <text class="small" x="160" y="204">lower relevance</text>
  <text class="small" x="640" y="190">higher relevance</text>
</svg>
