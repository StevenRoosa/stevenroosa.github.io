<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Control limits for operational monitoring</title>
  <desc id="desc">A time series chart with a mean line, upper and lower control limits, and one point above the upper control limit.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
    <style>
      .bg { fill: #f8f7f3; }
      .panel { fill: #fffefa; stroke: #d7d3c8; stroke-width: 2; }
      .axis { stroke: #20211d; stroke-width: 2; }
      .grid { stroke: #d7d3c8; stroke-width: 1; }
      .mean { stroke: #2f5d62; stroke-width: 3; }
      .limit { stroke: #9b4f2f; stroke-width: 3; stroke-dasharray: 9 8; }
      .series { fill: none; stroke: #7f9fcc; stroke-width: 4; }
      .point { fill: #edf3ff; stroke: #7f9fcc; stroke-width: 3; }
      .bad { fill: #f4d5b6; stroke: #9b4f2f; stroke-width: 4; }
      .arrow { fill: none; stroke: #2f5d62; stroke-width: 3; marker-end: url(#arrow); }
      .title { fill: #20211d; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 30px; font-weight: 750; }
      .label { fill: #20211d; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 650; }
      .small { fill: #62665c; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; }
    </style>
  </defs>
  <rect class="bg" width="920" height="520"/>
  <rect class="panel" x="42" y="38" width="836" height="444" rx="8"/>
  <text class="title" x="84" y="90">Control limits flag process breaks</text>
  <text class="small" x="84" y="122">A point outside expected variation deserves investigation before it becomes a production incident.</text>

  <line class="axis" x1="112" y1="406" x2="808" y2="406"/>
  <line class="axis" x1="112" y1="406" x2="112" y2="164"/>
  <line class="grid" x1="112" y1="220" x2="808" y2="220"/>
  <line class="grid" x1="112" y1="312" x2="808" y2="312"/>
  <line class="limit" x1="112" y1="220" x2="808" y2="220"/>
  <line class="mean" x1="112" y1="312" x2="808" y2="312"/>
  <line class="limit" x1="112" y1="384" x2="808" y2="384"/>

  <path class="series" d="M 150 320 L 204 304 L 258 326 L 312 310 L 366 316 L 420 298 L 474 318 L 528 306 L 582 314 L 636 302 L 690 292 L 744 174"/>
  <circle class="point" cx="150" cy="320" r="8"/>
  <circle class="point" cx="204" cy="304" r="8"/>
  <circle class="point" cx="258" cy="326" r="8"/>
  <circle class="point" cx="312" cy="310" r="8"/>
  <circle class="point" cx="366" cy="316" r="8"/>
  <circle class="point" cx="420" cy="298" r="8"/>
  <circle class="point" cx="474" cy="318" r="8"/>
  <circle class="point" cx="528" cy="306" r="8"/>
  <circle class="point" cx="582" cy="314" r="8"/>
  <circle class="point" cx="636" cy="302" r="8"/>
  <circle class="point" cx="690" cy="292" r="8"/>
  <circle class="bad" cx="744" cy="174" r="10"/>

  <text class="label" x="820" y="226">UCL</text>
  <text class="label" x="820" y="318">mean</text>
  <text class="label" x="820" y="390">LCL</text>
  <path class="arrow" d="M 672 142 C 696 128, 724 136, 740 164"/>
  <text class="label" x="570" y="140">investigate this run</text>
  <text class="label" x="370" y="454">Time window</text>
  <text class="label" transform="translate(78 346) rotate(-90)">Metric rate</text>
</svg>
