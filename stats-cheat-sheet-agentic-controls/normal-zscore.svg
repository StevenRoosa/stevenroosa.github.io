<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Normal curve with standard deviations and z-score</title>
  <desc id="desc">A bell curve marked at the mean and standard deviation intervals, with a z equals 2 marker in the right tail.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d62"/>
    </marker>
    <style>
      .bg { fill: #f8f7f3; }
      .panel { fill: #fffefa; stroke: #d7d3c8; stroke-width: 2; }
      .axis { stroke: #20211d; stroke-width: 2; }
      .curve { fill: none; stroke: #2f5d62; stroke-width: 5; }
      .shade { fill: #f4d5b6; opacity: 0.75; }
      .marker { stroke: #9b4f2f; stroke-width: 4; }
      .sd { stroke: #88aaa6; stroke-width: 2; stroke-dasharray: 6 7; }
      .arrow { fill: none; stroke: #2f5d62; stroke-width: 3; marker-end: url(#arrow); }
      .title { fill: #20211d; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 30px; font-weight: 750; }
      .label { fill: #20211d; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 650; }
      .small { fill: #62665c; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; }
    </style>
  </defs>
  <rect class="bg" width="920" height="520"/>
  <rect class="panel" x="42" y="38" width="836" height="444" rx="8"/>
  <text class="title" x="84" y="90">Standard deviation gives z-scores their scale</text>
  <text class="small" x="84" y="122">A z-score tells how many standard deviations a value sits from the mean.</text>

  <line class="axis" x1="112" y1="392" x2="808" y2="392"/>
  <path class="shade" d="M 574 392 C 610 260, 650 210, 694 246 C 728 274, 756 342, 792 392 Z"/>
  <path class="curve" d="M 112 392 C 174 392, 214 374, 260 330 C 314 278, 340 176, 460 176 C 580 176, 606 278, 660 330 C 706 374, 746 392, 808 392"/>

  <line class="sd" x1="226" y1="176" x2="226" y2="392"/>
  <line class="sd" x1="343" y1="176" x2="343" y2="392"/>
  <line class="marker" x1="460" y1="152" x2="460" y2="392"/>
  <line class="sd" x1="577" y1="176" x2="577" y2="392"/>
  <line class="marker" x1="694" y1="196" x2="694" y2="392"/>

  <text class="label" x="460" y="424" text-anchor="middle">mean</text>
  <text class="small" x="226" y="424" text-anchor="middle">-2 SD</text>
  <text class="small" x="343" y="424" text-anchor="middle">-1 SD</text>
  <text class="small" x="577" y="424" text-anchor="middle">+1 SD</text>
  <text class="label" x="694" y="424" text-anchor="middle">+2 SD</text>

  <path class="arrow" d="M 760 188 C 746 176, 724 176, 700 196"/>
  <text class="label" x="692" y="166">z = 2.0</text>
</svg>
